name: Test

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Layer A — Static analysis: module linting, workflow linting, IaC security
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6.2.2
        with:
          tflint_version: latest

      - name: TFLint init
        run: tflint --init

      - name: TFLint
        run: tflint --recursive

      - name: Lint GitHub Actions workflows
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: modules/
          exit-code: "1"
          severity: HIGH,CRITICAL

  # ---------------------------------------------------------------------------
  # Layer B — OpenTofu unit tests (no Azure credentials required)
  # ---------------------------------------------------------------------------
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Init (no backend)
        working-directory: modules/azure-static-webapp
        run: tofu init -backend=false

      - name: Run unit tests
        working-directory: modules/azure-static-webapp
        run: tofu test
