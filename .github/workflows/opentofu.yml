name: OpenTofu

on:
  workflow_call:
    inputs:
      environment:
        description: >
          GitHub Environment name used to gate the apply job with required reviewers.
          Create this environment in your repo's Settings > Environments before use.
        type: string
        required: false
        default: production
      working_directory:
        description: Path to the directory containing the OpenTofu root module.
        type: string
        required: false
        default: "."
      tofu_version:
        description: OpenTofu CLI version to install.
        type: string
        required: false
        default: latest
    secrets:
      AZURE_CLIENT_ID:
        description: Client ID of the Azure App Registration used for OIDC authentication.
        required: true
      AZURE_TENANT_ID:
        description: Azure Active Directory tenant ID.
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: Azure subscription ID where resources will be deployed.
        required: true
      TF_BACKEND_RESOURCE_GROUP:
        description: Resource group containing the Azure Storage Account used for OpenTofu state.
        required: true
      TF_BACKEND_STORAGE_ACCOUNT:
        description: Storage Account name used for OpenTofu state.
        required: true
      TF_BACKEND_CONTAINER:
        description: Blob container name used for OpenTofu state.
        required: true
      TF_BACKEND_KEY:
        description: Blob key (file path) for the state file (e.g. "myapp/terraform.tfstate").
        required: true

permissions:
  id-token: write  # required for OIDC token exchange
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Validate: format check + syntax validation (no Azure credentials needed)
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ inputs.tofu_version }}

      - name: Check formatting
        run: tofu fmt -check -recursive

      - name: Init (no backend)
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  # ---------------------------------------------------------------------------
  # Job 2 — Plan: authenticate, init with remote state, create and upload plan
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ inputs.tofu_version }}

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Init with remote backend
        run: |
          tofu init \
            -backend-config="use_azuread_auth=true" \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}"

      - name: Plan
        id: plan
        run: |
          set +e
          tofu plan -out=tfplan -detailed-exitcode
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 1 ]; then
            echo "OpenTofu plan failed."
            exit 1
          fi

          if [ $EXIT_CODE -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Infrastructure changes detected. Approval required before apply."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No infrastructure changes detected."
          fi

      - name: Upload plan artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3 — Apply: runs only when changes exist; gated by GitHub Environment approval
  # ---------------------------------------------------------------------------
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ inputs.tofu_version }}

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Init with remote backend
        run: |
          tofu init \
            -backend-config="use_azuread_auth=true" \
            -backend-config="resource_group_name=${{ secrets.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ secrets.TF_BACKEND_KEY }}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.working_directory }}

      - name: Apply
        run: tofu apply -auto-approve tfplan
